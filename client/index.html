<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Space Shooter - 6-player multiplayer arcade casino game" />
  <title>Space Shooter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }
    #game-container {
      position: relative;
      width: 1920px;
      height: 1080px;
      max-width: 100vw;
      max-height: 100vh;
    }
    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2e, #1a0a3e, #0a1a2e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: #ffffff;
    }
    #loading-screen h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .loading-bar {
      width: 300px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      border-radius: 2px;
      animation: loading 2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 80%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <h1>Space Shooter</h1>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
